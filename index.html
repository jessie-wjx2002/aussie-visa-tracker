<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Australian Visa 730-Day Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
    }
    body {
      background: #f1f5f9;
    }
    #dashboard {
      transition: background 1.2s ease;
      border-radius: 1.5rem;
      padding: 1rem;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
    }
    @media (min-width: 640px) {
      #dashboard {
        padding: 1.25rem;
        margin-left: -1rem;
        margin-right: -1rem;
      }
    }
    #dashboard.dashboard-safe-default {
      background: #D1D5DB;
    }
    #location-toggle[aria-pressed="true"] .toggle-thumb {
      transform: translateX(2.25rem);
    }
    @media (min-width: 640px) {
      #location-toggle[aria-pressed="true"] .toggle-thumb {
        transform: translateX(3rem);
      }
    }
    .glass {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }
    .toggle-track {
      transition: background 0.35s ease, transform 0.2s ease;
    }
    .toggle-thumb {
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .progress-fill {
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.6s ease;
    }
    details > summary {
      list-style: none;
    }
    details > summary::-webkit-details-marker {
      display: none;
    }
    @media (prefers-reduced-motion: reduce) {
      #dashboard, .progress-fill, .toggle-track, .toggle-thumb {
        transition: none !important;
      }
    }
  </style>
</head>
<body class="min-h-screen text-slate-900 antialiased">

  <div id="app" class="mx-auto max-w-2xl px-4 pb-16 pt-6 sm:px-6 sm:pt-10">

    <!-- Auth Section -->
    <section id="auth-section" class="glass rounded-3xl p-8 sm:p-10">
      <div class="mb-8 text-center">
        <p class="text-5xl mb-3" aria-hidden="true">🇦🇺</p>
        <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 leading-tight">
          Visa 730-Day Tracker
        </h1>
        <p class="mt-3 text-xl text-slate-600 leading-relaxed">
          Subclass 155 · Rolling 5-year residence
        </p>
      </div>

      <div id="auth-message" class="hidden mb-4 rounded-2xl bg-red-50 px-5 py-4 text-lg text-red-700" role="alert"></div>

      <form id="auth-form" class="space-y-5">
        <div>
          <label for="email" class="block text-xl font-semibold text-slate-700 mb-2">Email</label>
          <input id="email" type="email" required autocomplete="email"
            class="w-full rounded-2xl border-2 border-slate-200 px-5 py-4 text-xl focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-200" />
        </div>
        <div>
          <label for="password" class="block text-xl font-semibold text-slate-700 mb-2">Password</label>
          <input id="password" type="password" required minlength="6" autocomplete="current-password"
            class="w-full rounded-2xl border-2 border-slate-200 px-5 py-4 text-xl focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-200" />
        </div>
        <button type="submit" id="auth-submit"
          class="w-full rounded-2xl bg-emerald-600 py-5 text-2xl font-bold text-white shadow-lg hover:bg-emerald-700 active:scale-[0.98] transition">
          Sign In
        </button>
      </form>

      <p class="mt-6 text-center text-lg text-slate-600">
        <button type="button" id="auth-toggle-mode" class="font-semibold text-emerald-700 underline underline-offset-4 hover:text-emerald-900">
          Need an account? Sign up
        </button>
      </p>
    </section>

    <!-- Dashboard Section -->
    <div id="dashboard" class="hidden space-y-6">

      <header class="flex items-center justify-between gap-3">
        <p class="text-lg text-white/90 font-medium truncate" id="user-email-display"></p>
        <button type="button" id="sign-out-btn"
          class="shrink-0 rounded-xl bg-white/20 px-4 py-2 text-lg font-semibold text-white backdrop-blur hover:bg-white/30 transition">
          Sign out
        </button>
      </header>

      <!-- Location Toggle -->
      <button type="button" id="location-toggle" aria-pressed="false"
        class="toggle-track w-full rounded-3xl p-1 shadow-2xl focus:outline-none focus-visible:ring-4 focus-visible:ring-white/50">
        <div class="glass rounded-[1.35rem] px-5 py-6 sm:py-8 flex items-center justify-between gap-4">
          <span id="toggle-label" class="text-2xl sm:text-3xl font-bold text-slate-800 text-left leading-snug">
            ✈️ I am OUTSIDE Australia
          </span>
          <div class="relative shrink-0 w-20 h-11 sm:w-24 sm:h-12 rounded-full bg-slate-300" aria-hidden="true">
            <div id="toggle-thumb" class="toggle-thumb absolute top-1 left-1 w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-white shadow-md"></div>
          </div>
        </div>
      </button>

      <!-- Primary Metrics -->
      <section class="glass rounded-3xl p-6 sm:p-8">
        <div class="grid grid-cols-2 gap-6 mb-8">
          <div class="text-center">
            <p class="text-xl sm:text-2xl font-semibold text-slate-600 mb-1">Days Banked</p>
            <p id="days-banked" class="text-6xl sm:text-7xl font-black text-emerald-700 tabular-nums leading-none">0</p>
          </div>
          <div class="text-center">
            <p class="text-xl sm:text-2xl font-semibold text-slate-600 mb-1">Still Needed</p>
            <p id="days-needed" class="text-6xl sm:text-7xl font-black text-slate-800 tabular-nums leading-none">730</p>
          </div>
        </div>

        <div class="mb-3 flex justify-between text-lg font-semibold text-slate-600">
          <span>Progress to 730 days</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="h-6 sm:h-8 rounded-full bg-slate-200 overflow-hidden" role="progressbar"
          aria-valuemin="0" aria-valuemax="730" aria-valuenow="0" id="progress-bar-container">
          <div id="progress-fill" class="progress-fill h-full rounded-full bg-emerald-500" style="width: 0%"></div>
        </div>

        <p id="status-message" class="mt-6 text-xl sm:text-2xl font-semibold text-center text-slate-700 leading-relaxed"></p>
        <p id="window-hint" class="mt-2 text-lg text-center text-slate-500"></p>
      </section>

      <!-- Visa Cycle Configuration (With Status Label) -->
      <section class="glass rounded-3xl p-6 sm:p-8">
        <div class="flex items-center justify-between mb-3 gap-3">
          <label for="visa-expiry" class="block text-xl sm:text-2xl font-bold text-slate-800">
            Current visa cycle ends
          </label>
          <span id="visa-save-status" class="text-lg font-semibold text-slate-500 shrink-0"></span>
        </div>
        <input id="visa-expiry" type="date"
          class="w-full rounded-2xl border-2 border-slate-200 px-5 py-4 text-xl focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-200" />
        <p class="mt-3 text-lg text-slate-600">Powers your safety buffer: visa days left minus days still needed in Australia.</p>
      </section>

      <!-- Historical Flight Logger -->
      <details class="glass rounded-3xl overflow-hidden group" open>
        <summary class="cursor-pointer px-6 py-5 sm:px-8 sm:py-6 flex items-center justify-between select-none">
          <span class="text-2xl sm:text-3xl font-bold text-slate-800">✈️ Trip History (5 years)</span>
          <span class="text-3xl text-slate-400 group-open:rotate-180 transition-transform" aria-hidden="true">▼</span>
        </summary>

        <div class="px-6 pb-6 sm:px-8 sm:pb-8 border-t border-slate-100 pt-6 space-y-5">
          <form id="trip-form" class="grid gap-4 sm:grid-cols-2">
            <div>
              <label for="arrival-date" class="block text-xl font-semibold text-slate-700 mb-2">Date Arrived</label>
              <input id="arrival-date" type="date" required
                class="w-full rounded-2xl border-2 border-slate-200 px-4 py-4 text-xl" />
            </div>
            <div>
              <label for="departure-date" class="block text-xl font-semibold text-slate-700 mb-2">Date Departed</label>
              <input id="departure-date" type="date"
                class="w-full rounded-2xl border-2 border-slate-200 px-4 py-4 text-xl" />
              <p class="mt-1 text-base text-slate-500">Leave blank if still in Australia</p>
            </div>
            <button type="submit"
              class="sm:col-span-2 rounded-2xl bg-slate-800 py-4 text-2xl font-bold text-white hover:bg-slate-900 active:scale-[0.98] transition">
              + Add Trip
            </button>
          </form>

          <ul id="trip-list" class="max-h-72 overflow-y-auto space-y-3 pr-1" aria-live="polite"></ul>
          <p id="trip-empty" class="hidden text-xl text-center text-slate-500 py-4">No trips logged yet.</p>
        </div>
      </details>

    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://lcjgboslynvslnaejebj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxjamdib3NseW52c2xuYWVqZWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMjMxNDQsImV4cCI6MjA5NDg5OTE0NH0.jop_fBK4rnVskljiRJqTm8IodSjHyOkvxs-ST5sp3Xs';

    let VISA_CYCLE_END = '';
    const TARGET_DAYS = 730;
    const WINDOW_YEARS = 5;
    const BREATHING_ROOM_MAX = 365;
    const SAFE_DEFAULT_BG = '#D1D5DB';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let travelLogs = [];
    let openLogId = null;
    let isInAustralia = false;
    let notesRowId = null;
    let authMode = 'signin';
    let isCalculating = false;
    let isSyncingInputs = false;

    const $ = (id) => document.getElementById(id);

    function clearTripDateInputs() {
      isSyncingInputs = true;
      try {
        $('arrival-date').value = '';
        $('departure-date').value = '';
      } finally {
        isSyncingInputs = false;
      }
    }

    function readCompleteDateInput(id) {
      const raw = $(id)?.value;
      if (!raw || !isValidDateString(raw)) return null;
      return raw.trim();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Date Utilities
    // ═══════════════════════════════════════════════════════════════════════
    function parseLocalDate(str) {
      if (!str || typeof str !== 'string') return null;
      const parts = str.trim().split('-');
      if (parts.length !== 3) return null;
      const [y, m, d] = parts.map(Number);
      if (![y, m, d].every(Number.isFinite)) return null;
      const date = new Date(y, m - 1, d);
      if (Number.isNaN(date.getTime())) return null;
      return date;
    }

    function isNonEmptyString(value) {
      return typeof value === 'string' && value.trim().length > 0;
    }

    function isValidDateString(str) {
      return isNonEmptyString(str) && parseLocalDate(str) !== null;
    }

    function safeFiniteNumber(value, fallback = null) {
      if (value === null || value === undefined) return fallback;
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatLocalDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function todayLocal() {
      const t = new Date();
      return new Date(t.getFullYear(), t.getMonth(), t.getDate());
    }

    function addYears(date, years) {
      const d = new Date(date);
      d.setFullYear(d.getFullYear() - years);
      return d;
    }

    function inclusiveDays(start, end) {
      const ms = end.getTime() - start.getTime();
      return Math.floor(ms / 86400000) + 1;
    }

    function safeVisaDaysLeft(endDateStr) {
      if (!isValidDateString(endDateStr)) return null;
      const end = parseLocalDate(endDateStr.trim());
      const today = todayLocal();
      if (!end || !today || Number.isNaN(end.getTime()) || Number.isNaN(today.getTime())) {
        return null;
      }
      if (end < today) return 0;
      return safeFiniteNumber(inclusiveDays(today, end) - 1, null);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Core Logic calculations
    // ═══════════════════════════════════════════════════════════════════════
    function getWindowStart() {
      return addYears(todayLocal(), WINDOW_YEARS);
    }

    function calculateBankedDays(logs) {
      const today = todayLocal();
      const windowStart = getWindowStart();
      let total = 0;

      const sorted = [...logs].sort((a, b) => parseLocalDate(a.arrival_date) - parseLocalDate(b.arrival_date));

      for (const log of sorted) {
        const arrival = parseLocalDate(log.arrival_date);
        if (!arrival || arrival > today) continue;

        let departure = log.departure_date ? parseLocalDate(log.departure_date) : today;
        if (departure > today) departure = today;
        if (departure < arrival) continue;

        const effectiveStart = arrival < windowStart ? windowStart : arrival;
        const effectiveEnd = departure;

        if (effectiveStart > effectiveEnd || effectiveEnd < windowStart) continue;

        total += inclusiveDays(effectiveStart, effectiveEnd);
      }

      return safeFiniteNumber(Math.min(total, TARGET_DAYS), 0);
    }

    function daysStillNeeded(bankedDays) {
      return Math.max(0, TARGET_DAYS - safeFiniteNumber(bankedDays, 0));
    }

    function calculateBreathingRoom(bankedDays) {
      const banked = safeFiniteNumber(bankedDays, null);
      if (banked === null || !isValidDateString(VISA_CYCLE_END)) return null;

      const visaDaysLeft = safeVisaDaysLeft(VISA_CYCLE_END);
      const needed = daysStillNeeded(banked);
      if (visaDaysLeft === null) return null;

      if (banked >= TARGET_DAYS) return visaDaysLeft;
      return visaDaysLeft - needed;
    }

    function getStatusState(bankedDays) {
      const daysNeeded = daysStillNeeded(bankedDays);
      const visaDaysLeft = safeVisaDaysLeft(VISA_CYCLE_END);
      const breathingRoom = calculateBreathingRoom(bankedDays);
      const displayVisaLeft = visaDaysLeft === null ? '—' : visaDaysLeft;

      if (breathingRoom !== null && breathingRoom < 0) {
        return { zone: 'fail', daysNeeded, visaDaysLeft: displayVisaLeft, breathingRoom };
      }
      if (safeFiniteNumber(bankedDays, 0) >= TARGET_DAYS) {
        return { zone: 'safe', daysNeeded: 0, visaDaysLeft: displayVisaLeft, breathingRoom };
      }
      return { zone: 'progress', daysNeeded, visaDaysLeft: displayVisaLeft, breathingRoom };
    }

    function buildHslBreathingRoomGradient(breathingRoom) {
      const room = safeFiniteNumber(breathingRoom, null);
      const max = safeFiniteNumber(BREATHING_ROOM_MAX, null);
      if (room === null || max === null || max <= 0 || room < 0) return null;

      const clamped = Math.min(Math.max(room, 0), max);
      const t = clamped / max;
      const hueStart = Math.round(t * 120);
      const hueEnd = Math.min(120, hueStart + 14);

      return `linear-gradient(145deg, hsl(${hueStart}, 72%, 42%) 0%, hsl(${hueEnd}, 72%, 50%) 100%)`;
    }

    function applyDashboardBackground(bankedDays) {
      const dashboard = $('dashboard');
      if (!dashboard) return;

      try {
        const breathingRoom = calculateBreathingRoom(bankedDays);

        if (breathingRoom === null) {
          dashboard.style.background = SAFE_DEFAULT_BG;
          return;
        }
        if (breathingRoom < 0) {
          dashboard.style.background = '#ef4444'; // Solid Red for impossible targets
          return;
        }

        const gradient = buildHslBreathingRoomGradient(breathingRoom);
        dashboard.style.background = gradient || SAFE_DEFAULT_BG;
      } catch (err) {
        dashboard.style.background = SAFE_DEFAULT_BG;
      }
    }

    function updateDashboard() {
      if (isCalculating) return;
      isCalculating = true;

      try {
        const banked = calculateBankedDays(travelLogs);
        const needed = daysStillNeeded(banked);
        const pct = Math.min(100, Math.round((banked / TARGET_DAYS) * 100));
        const theme = getStatusState(banked);

        applyDashboardBackground(banked);

        $('days-banked').textContent = banked;
        $('days-needed').textContent = needed;
        $('progress-percent').textContent = `${pct}%`;
        $('progress-fill').style.width = `${pct}%`;
        $('progress-bar-container').setAttribute('aria-valuenow', banked);

        const windowStart = getWindowStart();
        $('window-hint').textContent = `Counting days from ${formatLocalDate(windowStart)} to today`;

        let msg = '';
        const room = theme.breathingRoom;
        if (theme.zone === 'fail') {
          msg = `⚠️ Impossible to reach 730 — only ${theme.visaDaysLeft} days left on your visa but ${theme.daysNeeded} more days in Australia are still required.`;
          $('progress-fill').className = 'progress-fill h-full rounded-full bg-slate-700';
        } else if (theme.zone === 'safe') {
          msg = '✅ 730-day requirement met! You have comfortable breathing room on your visa.';
          $('progress-fill').className = 'progress-fill h-full rounded-full bg-emerald-500';
        } else if (room === null) {
          msg = '📅 Set your visa end date below to see your safety buffer and dashboard colour.';
          $('progress-fill').className = 'progress-fill h-full rounded-full bg-slate-400';
        } else {
          msg = `🛡️ Safety buffer: ${room} day${room === 1 ? '' : 's'} of breathing room (${theme.visaDaysLeft} on visa − ${theme.daysNeeded} still needed in Australia).`;
          $('progress-fill').className = 'progress-fill h-full rounded-full bg-emerald-500';
        }
        $('status-message').textContent = msg;
      } finally {
        isCalculating = false;
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // UI Interactions
    // ═══════════════════════════════════════════════════════════════════════
    function syncToggleUI() {
      const label = $('toggle-label');
      const track = $('location-toggle').querySelector('.relative');

      if (isInAustralia) {
        label.textContent = '📍 I am currently IN Australia';
        $('location-toggle').setAttribute('aria-pressed', 'true');
        track.classList.replace('bg-slate-300', 'bg-emerald-500');
      } else {
        label.textContent = '✈️ I am OUTSIDE Australia';
        $('location-toggle').setAttribute('aria-pressed', 'false');
        track.classList.replace('bg-emerald-500', 'bg-slate-300');
      }
    }

    function detectOpenLog() {
      const open = travelLogs.find((l) => !l.departure_date);
      openLogId = open ? open.id : null;
      isInAustralia = !!open;
      syncToggleUI();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Supabase Core Data Management
    // ═══════════════════════════════════════════════════════════════════════
    async function loadTravelLogs() {
      const { data, error } = await supabaseClient
        .from('travel_logs')
        .select('*')
        .order('arrival_date', { ascending: false });

      if (error) throw error;
      travelLogs = data || [];
      detectOpenLog();
      renderTripList();
      updateDashboard();
    }

    async function loadNotes() {
      const { data, error } = await supabaseClient
        .from('travel_notes')
        .select('*')
        .maybeSingle();

      if (error) throw error;

      if (data) {
        notesRowId = data.id;
        // The content column now strictly holds just the YYYY-MM-DD string
        VISA_CYCLE_END = data.content?.trim() || '';
        
        isSyncingInputs = true;
        try {
          $('visa-expiry').value = VISA_CYCLE_END;
        } finally {
          isSyncingInputs = false;
        }
        updateDashboard();
      } else {
        const { data: created, error: insertErr } = await supabaseClient
          .from('travel_notes')
          .insert({ user_id: currentUser.id, content: '' })
          .select()
          .single();

        if (insertErr) throw insertErr;
        notesRowId = created.id;
        VISA_CYCLE_END = '';
        updateDashboard();
      }
    }

    async function saveVisaDate() {
      if (!notesRowId || isSyncingInputs) return;

      const selectedDate = $('visa-expiry').value;
      VISA_CYCLE_END = selectedDate || '';

      $('visa-save-status').textContent = 'Saving…';
      
      const { error } = await supabaseClient
        .from('travel_notes')
        .update({ content: VISA_CYCLE_END, updated_at: new Date().toISOString() })
        .eq('id', notesRowId);

      $('visa-save-status').textContent = error ? 'Save failed' : 'Saved ✓';
      if (!error) {
        setTimeout(() => { $('visa-save-status').textContent = ''; }, 2000);
        updateDashboard();
      }
    }

    async function toggleLocation() {
      const today = formatLocalDate(todayLocal());

      if (isInAustralia && openLogId) {
        const { error } = await supabaseClient.from('travel_logs').update({ departure_date: today }).eq('id', openLogId);
        if (error) throw error;
      } else if (!isInAustralia) {
        const { error } = await supabaseClient.from('travel_logs').insert({ user_id: currentUser.id, arrival_date: today, departure_date: null });
        if (error) throw error;
      }
      await loadTravelLogs();
    }

    async function addTrip(arrival, departure) {
      if (!departure && travelLogs.some((l) => !l.departure_date)) {
        throw new Error('You already have an open stay in Australia.');
      }
      const { error } = await supabaseClient.from('travel_logs').insert({ user_id: currentUser.id, arrival_date: arrival, departure_date: departure || null });
      if (error) throw error;
      await loadTravelLogs();
    }

    async function deleteTrip(id) {
      if (!confirm('Delete this trip record?')) return;
      const { error } = await supabaseClient.from('travel_logs').delete().eq('id', id);
      if (error) throw error;
      await loadTravelLogs();
    }

    function renderTripList() {
      const list = $('trip-list');
      const empty = $('trip-empty');
      const windowStart = getWindowStart();
      const today = todayLocal();

      const visible = travelLogs.filter((log) => {
        const arrival = parseLocalDate(log.arrival_date);
        const departure = log.departure_date ? parseLocalDate(log.departure_date) : today;
        return departure >= windowStart && arrival <= today;
      });

      list.innerHTML = '';
      if (visible.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      for (const log of visible) {
        const li = document.createElement('li');
        li.className = 'flex items-center justify-between gap-3 rounded-2xl bg-slate-50 px-4 py-4 border border-slate-100';
        const depLabel = log.departure_date ? formatDisplayDate(log.departure_date) : 'Present';

        li.innerHTML = `
          <div class="min-w-0 flex-1">
            <p class="text-xl font-bold text-slate-800 truncate">${formatDisplayDate(log.arrival_date)} → ${depLabel}</p>
            ${!log.departure_date ? '<p class="text-base text-emerald-700 font-semibold">Currently in Australia</p>' : ''}
          </div>
          <button type="button" aria-label="Delete trip" class="shrink-0 rounded-xl p-3 text-2xl hover:bg-red-100 active:scale-95 transition" data-delete="${log.id}">🗑️</button>
        `;
        li.querySelector('[data-delete]').addEventListener('click', () => deleteTrip(log.id));
        list.appendChild(li);
      }
    }

    function formatDisplayDate(str) {
      const d = parseLocalDate(str);
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function showAuth() {
      $('auth-section').classList.remove('hidden');
      $('dashboard').classList.add('hidden');
    }

    function showDashboard() {
      $('auth-section').classList.add('hidden');
      $('dashboard').classList.remove('hidden');
      $('user-email-display').textContent = currentUser?.email || '';
    }

    function showAuthError(msg) {
      const el = $('auth-message');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function clearAuthError() {
      $('auth-message').classList.add('hidden');
    }

    async function initSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      handleSession(session);
      supabaseClient.auth.onAuthStateChange((_event, session) => { handleSession(session); });
    }

    async function handleSession(session) {
      if (session?.user) {
        currentUser = session.user;
        showDashboard();
        try {
          await Promise.all([loadTravelLogs(), loadNotes()]);
        } catch (err) {
          console.error("Data loading failed:", err);
        }
      } else {
        currentUser = null;
        showAuth();
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Initialization & Pure Listeners
    // ═══════════════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      initSession();

      $('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAuthError();
        const email = $('email').value.trim();
        const password = $('password').value;
        const submitBtn = $('auth-submit');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';

        try {
          if (authMode === 'signin') {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
          } else {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            alert('Signup successful!');
          }
        } catch (err) {
          showAuthError(err.message || 'Authentication failed.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
        }
      });

      $('auth-toggle-mode').addEventListener('click', () => {
        clearAuthError();
        if (authMode === 'signin') {
          authMode = 'signup';
          $('auth-submit').textContent = 'Sign Up';
          $('auth-toggle-mode').textContent = 'Already have an account? Sign in';
        } else {
          authMode = 'signin';
          $('auth-submit').textContent = 'Sign In';
          $('auth-toggle-mode').textContent = 'Need an account? Sign up';
        }
      });

      $('sign-out-btn').addEventListener('click', async () => {
        if (isCalculating) return;
        if (confirm('Are you sure you want to sign out?')) {
          await supabaseClient.auth.signOut();
          VISA_CYCLE_END = '';
          window.location.reload();
        }
      });

      $('location-toggle').addEventListener('click', async () => {
        if (isCalculating) return;
        try { await toggleLocation(); } catch (err) { alert('Failed to update location.'); }
      });

      $('trip-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isCalculating) return;

        const arrival = readCompleteDateInput('arrival-date');
        const departure = readCompleteDateInput('departure-date');

        if (!arrival) {
          alert('A valid arrival date is required.');
          return;
        }

        try {
          await addTrip(arrival, departure);
          clearTripDateInputs();
        } catch (err) {
          alert(err.message || 'Failed to add log.');
        }
      });

      // Target input change & blur events directly via single handler
      $('visa-expiry').addEventListener('change', saveVisaDate);
      $('visa-expiry').addEventListener('blur', saveVisaDate);
       
      window.addEventListener('pageshow', async (event) => {
        if (currentUser) {
          isCalculating = false;
          try { await loadTravelLogs(); } catch (err) { console.warn("Background recovery prevented crash."); }
        }
      });
    });
  </script>
</body>
</html>
